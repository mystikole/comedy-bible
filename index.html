<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comedy Bible" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Comedy Bible Homework</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f97316'/%3E%3Ctext x='50' y='72' font-family='Georgia' font-style='italic' font-size='70' text-anchor='middle' fill='%23111'%3EC%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f97316'/%3E%3Ctext x='50' y='72' font-family='Georgia' font-style='italic' font-size='70' text-anchor='middle' fill='%23111'%3EC%3C/text%3E%3C/svg%3E" />

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a0a; color: #f5f0e8; min-height: 100vh; overscroll-behavior-y: none; }
    body { font-family: -apple-system, "Figtree", sans-serif; }
    #root { min-height: 100vh; }
    .kole-boot { display: grid; place-items: center; min-height: 100vh; color: #888; font-style: italic; font-family: Georgia, serif; font-size: 22px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react": "https://esm.sh/lucide-react@0.468.0?external=react"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="kole-boot">Loading your material…</div>
  </div>

  <!-- Babel compiles the JSX in-browser; data-type="module" preserves ES module behavior -->
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script type="text/babel" data-type="module" data-presets="react" src="./app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
